<!DOCTYPE html>
<html lang="ko">
<head>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta charset="UTF-8">
  <title>전기기사 핵심 개념 노트</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- KaTeX 수식 CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    :root {
      --theme-color: #2c6fad;
      --sidebar-width: 280px;
    }

    /* ── 사이드바 ── */
    .sidebar {
      font-size: 14px;
    }
    .sidebar-nav li > a {
      font-weight: normal;
    }
    .sidebar-nav > ul > li > a {
      font-weight: bold;
      font-size: 15px;
    }

    /* ── 본문 제목 ── */
    .markdown-section h1 {
      font-size: 2rem;
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.5rem;
    }

    /* ── 코드 블록 ── */
    .markdown-section code {
      background: #f4f7fb;
      border-radius: 4px;
    }
    .markdown-section pre {
      background: #f4f7fb;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── 테이블: 모바일에서 가로 스크롤 ── */
    .markdown-section table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }
    /* 단, 좁은 테이블은 꽉 채우기 */
    @supports (width: fit-content) {
      .markdown-section table {
        width: fit-content;
        max-width: 100%;
      }
    }

    /* ── KaTeX 수식: 가로 스크롤 ── */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 4px 0;
    }

    /* ── 사이드바 토글 버튼 (모바일 터치 영역 확대) ── */
    .sidebar-toggle {
      width: 40px;
      height: 40px;
      padding: 8px;
    }

    /* ════════════════════════════════
       모바일 전용 (768px 이하)
    ════════════════════════════════ */
    @media screen and (max-width: 768px) {
      :root {
        --sidebar-width: 82vw;
      }

      /* 제목 크기 축소 */
      .markdown-section h1 {
        font-size: 1.5rem;
      }
      .markdown-section h2 {
        font-size: 1.2rem;
      }
      .markdown-section h3 {
        font-size: 1.05rem;
      }

      /* 검색창 — iOS 자동 확대 방지 (16px 미만이면 확대됨) */
      .search input {
        font-size: 16px;
      }

      /* 사이드바 링크 터치 영역 */
      .sidebar-nav li > a {
        padding: 5px 0;
        display: block;
        line-height: 1.6;
      }

      /* 본문 좌우 여백 */
      .content {
        padding: 0 12px;
      }

      /* blockquote 여백 */
      .markdown-section blockquote {
        margin: 1em 0;
        padding: 0.5em 1em;
      }
    }
  </style>
</head>
<body>
  <div id="app">⏳ 로딩 중...</div>
  <script>
    window.$docsify = {
      name: '⚡ 전기기사 핵심 노트',
      nameLink: '/',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 개념 검색...',
        noData: '검색 결과 없음',
        depth: 4,
        hideOtherSidebarContent: false
      },
      copyCode: {
        buttonText: '복사',
        errorText: '오류',
        successText: '완료'
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      notFoundPage: '404.md'
    }
  </script>

  <!-- Docsify 코어 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 검색 플러그인 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 코드 복사 버튼 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <!-- 테이블 정렬 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <!-- KaTeX 수식 렌더링 ($...$ 인라인, $$...$$ 블록) -->
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.js"></script>
</body>
</html>
